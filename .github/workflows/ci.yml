name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MindLayer
        run: bash install.sh --project . --no-onboard

      - name: Run test suite
        run: bash tools/test.sh

      - name: Run strict lint
        run: bash tools/lint.sh --project . --strict
